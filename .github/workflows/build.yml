name: Validate

on:
  push:
    branches: [main]

jobs:
  check:
    name: Code Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate backend JS files
        working-directory: backend
        run: |
          find src -name "*.js" -exec node --check {} \; && echo "All backend files valid"

      - name: Validate package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('backend/package.json'))" && echo "backend/package.json valid"
          node -e "JSON.parse(require('fs').readFileSync('mobile/package.json'))" && echo "mobile/package.json valid"
          echo "All package.json files valid"
